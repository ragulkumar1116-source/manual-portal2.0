<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Money Manager Pro</title>
  <meta name="description" content="Create a new account on Money Manager Pro to track budgets, income, expenses, and vehicle bills.">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase Compat Library Core CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Toast Notifications Area -->
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-logo-area">
        <h1 class="auth-logo">
          <i data-lucide="wallet"></i> Money Manager Pro
        </h1>
      </div>
      
      <div class="card panel-glass auth-card">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join us to start managing your personal capital</p>
        
        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="fullName" class="form-label">Full Name</label>
            <input type="text" id="fullName" class="form-input" placeholder="e.g. Ragul" required autocomplete="name">
          </div>

          <div class="form-group">
            <label for="mobileNumber" class="form-label">Mobile Number</label>
            <input type="tel" id="mobileNumber" class="form-input" placeholder="e.g. +91 9876543210" required autocomplete="tel">
          </div>
          
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="e.g. ragul@gmail.com" required autocomplete="email">
          </div>
          
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required autocomplete="new-password">
          </div>
          
          <button type="submit" id="register-submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            <span>Register</span>
          </button>
        </form>
        
        <div class="auth-actions">
          <a href="index.html" class="btn btn-secondary" id="back-to-login-link">
            <i data-lucide="arrow-left"></i> Back To Login
          </a>
        </div>
      </div>
      
      <div class="auth-footer">
        <p>© 2026 Money Manager Pro. Built for mobile and desktop.</p>
      </div>
    </div>
  </div>

  <!-- Shared Services and Logic Scripts -->
  <script src="firebase.js"></script>
  <script src="newuser.js"></script>
</body>
</html>
