<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Money Manager Pro</title>
  <meta name="description" content="Request a password reset link to recover access to your Money Manager Pro account.">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase Compat Library Core CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Toast Notifications Area -->
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-logo-area">
        <h1 class="auth-logo">
          <i data-lucide="wallet"></i> Money Manager Pro
        </h1>
      </div>
      
      <div class="card panel-glass auth-card">
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">We will send a password reset link to your email</p>
        
        <form id="forgot-form" novalidate>
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="e.g. ragul@gmail.com" required autocomplete="email">
          </div>
          
          <button type="submit" id="forgot-submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            <span>Send Reset Link</span>
          </button>
        </form>
        
        <div class="auth-actions">
          <a href="index.html" class="btn btn-secondary" id="back-to-login-link">
            <i data-lucide="arrow-left"></i> Back To Login
          </a>
        </div>
      </div>
      
      <div class="auth-footer">
        <p>© 2026 Money Manager Pro. Secure data transmission.</p>
      </div>
    </div>
  </div>

  <!-- Shared Services and Logic Scripts -->
  <script src="firebase.js"></script>
  <script src="forgot.js"></script>
</body>
</html>
