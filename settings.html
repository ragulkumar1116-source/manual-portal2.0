<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Money Manager Pro</title>
  <meta name="description" content="Configure profile settings, theme choices, and security updates for Money Manager Pro.">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase Compat Library Core CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="light">

  <!-- Toast Notifications Area -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main App Settings Layout -->
  <div class="app-layout">
    
    <!-- Sidebar navigation (desktop) -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i data-lucide="wallet"></i> Money Manager Pro
      </div>

      <!-- Compact User Details Card -->
      <div class="user-card-compact">
        <div class="user-name-compact" id="sb-user-name">Loading...</div>
        <div class="user-phone-compact" id="sb-user-phone">...</div>
        <div class="user-email-compact" id="sb-user-email">...</div>
      </div>

      <!-- Navigation Links -->
      <nav class="nav-menu">
        <a href="dashboard.html" class="nav-link">
          <i data-lucide="arrow-left"></i> Back to Dashboard
        </a>
      </nav>

      <div class="nav-footer">
        <button id="logout-btn" class="nav-link" style="border: none; background: transparent; width: 100%; text-align: left; cursor: pointer; color: var(--expense);">
          <i data-lucide="log-out"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
      <a href="dashboard.html" class="mobile-nav-link">
        <i data-lucide="arrow-left"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="mobile-nav-link active">
        <i data-lucide="settings"></i>
        <span>Settings</span>
      </a>
    </nav>

    <!-- Settings Workspace Frame -->
    <main class="main-content">
      <header class="main-header">
        <h2 class="page-title">Settings</h2>
      </header>

      <div class="content-body">
        <div class="settings-grid">
          
          <!-- Column 1: Profile and Theme Settings -->
          <div class="dashboard-column">
            
            <!-- Profile Settings Form Card -->
            <div class="card section-card">
              <div class="section-header">
                <h3 class="section-title"><i data-lucide="user"></i> Profile Settings</h3>
              </div>
              
              <form id="profile-settings-form">
                <div class="form-group">
                  <label for="profile-name" class="form-label">Full Name</label>
                  <input type="text" id="profile-name" class="form-input" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                  <label for="profile-phone" class="form-label">Mobile Number</label>
                  <input type="tel" id="profile-phone" class="form-input" placeholder="e.g. +91 XXXXX XXXXX" required>
                </div>

                <button type="submit" id="profile-save-btn" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;">
                  <span>Save Profile Changes</span>
                </button>
              </form>
            </div>

            <!-- Theme Settings Options Card -->
            <div class="card section-card">
              <div class="section-header">
                <h3 class="section-title"><i data-lucide="palette"></i> Theme Customization</h3>
              </div>
              
              <div class="theme-options">
                <div class="theme-card" id="theme-light" data-val="light">
                  <div class="theme-icon"><i data-lucide="sun"></i></div>
                  <span>Light Mode</span>
                </div>

                <div class="theme-card" id="theme-dark" data-val="dark">
                  <div class="theme-icon"><i data-lucide="moon"></i></div>
                  <span>Dark Mode</span>
                </div>

                <div class="theme-card" id="theme-auto" data-val="auto">
                  <div class="theme-icon"><i data-lucide="monitor"></i></div>
                  <span>Auto Mode</span>
                </div>
              </div>
            </div>

          </div>

          <!-- Column 2: Account Security Credentials Settings -->
          <div class="dashboard-column">
            
            <!-- Password Updates Security Settings Card -->
            <div class="card section-card">
              <div class="section-header">
                <h3 class="section-title"><i data-lucide="shield-check"></i> Security Settings</h3>
              </div>
              
              <form id="security-settings-form">
                <div class="form-group">
                  <label for="security-password" class="form-label">New Password</label>
                  <input type="password" id="security-password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
                </div>

                <div class="form-group">
                  <label for="security-confirm" class="form-label">Confirm New Password</label>
                  <input type="password" id="security-confirm" class="form-input" placeholder="Re-enter password" required autocomplete="new-password">
                </div>

                <button type="submit" id="security-save-btn" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;">
                  <span>Update Password</span>
                </button>
              </form>
            </div>

            <!-- Details metadata card -->
            <div class="card section-card" style="opacity: 0.85;">
              <div class="section-header">
                <h3 class="section-title"><i data-lucide="info"></i> Account Metadata</h3>
              </div>
              <div style="font-size: 0.85rem; display: flex; flex-direction: column; gap: 0.5rem;">
                <div style="display: flex; justify-content: space-between;">
                  <span style="color: var(--text-tertiary);">Authentication ID</span>
                  <span style="font-family: monospace; font-weight: bold;" id="meta-uid">loading...</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                  <span style="color: var(--text-tertiary);">Authentication Email</span>
                  <span id="meta-email" style="font-weight: bold;">loading...</span>
                </div>
              </div>
            </div>

          </div>

        </div>
      </div>
    </main>

  </div>

  <!-- Shared Services and Logic Scripts -->
  <script src="firebase.js"></script>
  <script src="settings.js"></script>
</body>
</html>
